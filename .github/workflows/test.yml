name: '🧪 Run tests'

on:
  workflow_call:
    inputs:
      ref:
        description: 'Ref to run on'
        type: string
        required: false

jobs:
  test-frontend:
    runs-on: ubuntu-22.04
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: 'Cache test results'
        uses: actions/cache@v5
        id: cache
        with:
          path: |
            coverage
            junit
          key: test-frontend-${{ hashFiles('**/package.json', '**/yarn.lock', 'views/js/**/*') }}

      - uses: myparcelnl/actions/pdk-setup-frontend@v5
        if: steps.cache.outputs.cache-hit != 'true'

      - name: 'Run frontend tests'
        if: steps.cache.outputs.cache-hit != 'true'
        uses: myparcelnl/actions/nx-run-many@v5
        with:
          target: 'test:coverage'
          parallel: 1

      - uses: myparcelnl/actions/collect-test-results@v5
        if: always() && steps.cache.outputs.cache-hit != 'true'

      - uses: myparcelnl/actions/codecov-coverage@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: frontend
          flags: frontend
          files: coverage/*.xml

      - uses: myparcelnl/actions/codecov-test-results@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: frontend
          flags: frontend
          files: junit/*.xml

  test-backend:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: 'Cache coverage'
        uses: actions/cache@v5
        id: cache
        with:
          path: |
            clover.xml
            junit.xml
          key: test-backend-php${{ matrix.php-version }}-${{ hashFiles('**/composer.json', '**/composer.lock', 'src/**/*', 'tests/**/*') }}

      - uses: myparcelnl/actions/pdk-setup@v5
        if: steps.cache.outputs.cache-hit != 'true'
        id: setup
        with:
          php-version: ${{ matrix.php-version }}

      - uses: myparcelnl/actions/pdk-builder@v5
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          command: 'translations'

      - uses: myparcelnl/actions/composer-pest@v5
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          image: ${{ steps.setup.outputs.image }}
          pest-args: |
            --log-junit=junit.xml

      - name: 'Fix coverage file'
        if: always() && steps.cache.outputs.cache-hit != 'true'
        shell: bash
        #language=bash
        run: |
          # Strip the /app/ prefix (absolute path from the docker container) from the coverage paths before uploading.
          sed -i 's/\/app\///g' clover.xml

      - uses: myparcelnl/actions/codecov-coverage@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: backend-php${{ matrix.php-version }}
          flags: backend,php${{ matrix.php-version }}
          files: clover.xml

      - uses: myparcelnl/actions/codecov-test-results@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: backend-php${{ matrix.php-version }}
          flags: backend,php${{ matrix.php-version }}
          files: junit.xml
